<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed background — no rounded corners so any mask shape (circle, squircle) works -->
  <rect width="512" height="512" fill="#A3E635"/>
  <!-- Running figure scaled x10, centered within the 80% maskable safe zone -->
  <g transform="translate(89, 111) scale(10)" stroke-linecap="round">
    <circle cx="19" cy="8" r="3" fill="#0B0B0B"/>
    <line x1="19" y1="11" x2="17" y2="19" stroke="#0B0B0B" stroke-width="2.2"/>
    <line x1="18" y1="14" x2="13" y2="12" stroke="#0B0B0B" stroke-width="2"/>
    <line x1="17.5" y1="15" x2="22" y2="13.5" stroke="#0B0B0B" stroke-width="2"/>
    <line x1="17" y1="19" x2="14" y2="23" stroke="#0B0B0B" stroke-width="2.2"/>
    <line x1="14" y1="23" x2="10.5" y2="22" stroke="#0B0B0B" stroke-width="2"/>
    <line x1="17" y1="19" x2="20" y2="22.5" stroke="#0B0B0B" stroke-width="2.2"/>
    <line x1="20" y1="22.5" x2="23" y2="21.5" stroke="#0B0B0B" stroke-width="2"/>
  </g>
</svg>
